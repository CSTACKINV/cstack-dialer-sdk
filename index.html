    <script>
      (function (d, t) {
        var SRC_FILE = "/dist/1.0.5/cleverstack-sdk.js";
        var g = d.createElement(t),
          s = d.getElementsByTagName(t)[0];
        g.src = SRC_FILE;
        g.defer = true;
        g.async = true;
        g.onload = function () {
          CSDialerSDK.init({
            apiKey: "c82677ed89ede671",
            user_id: "100",
            authAPI: "https://api.cleverstack.in",
            open: true,
            wssServer: "sip.cleverstack.in",
            wssPort: "7443",
            sipDomain: "sip.cleverstack.in",
            isCallingEnabled: true,
            mode: null,
            displayMode: "inline",
            author: "AICC",
          });
        };
        s.parentNode.insertBefore(g, s);
      })(document, "script");
